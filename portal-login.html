<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal Login | Kalakruthi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="glass-header" id="navbar">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center; gap: 0.8rem;">
                    <img src="assets/yali.png" alt="Golden Yali Logo" class="yali-logo">
                    <h1>Kalakruthi<span class="dot">.</span></h1>
                </a>
            </div>
            <nav class="desktop-nav">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="philosophy.html">Philosophy</a></li>
                    <li><a href="portal-login.html" style="color: var(--clr-terra-cotta);">Client Portal</a></li>
                    <li><a href="quotation.html" class="btn-primary">Get Estimate</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="portal-hero">
            <div class="container fade-in-up" style="opacity: 1; transform: none;">
                <div class="auth-container">
                    <h2 style="margin-bottom: 0.5rem; font-family: var(--font-heading); font-size: 2.5rem;">Client Portal</h2>
                    <p style="color: var(--clr-gray); margin-bottom: 2rem;">Log in to track your premium project's progress.</p>
                    <form action="client-dashboard.html" method="GET">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" class="form-control" placeholder="client@kalakruthi.com" required value="anil.v@example.com">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required value="password123">
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
                    </form>
                    <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--clr-gray);">Demo login pre-filled for Anil V</p>
                </div>
            </div>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
